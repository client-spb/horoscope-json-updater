<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ Звёздный Гид | Гороскоп</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9b4dff;
            --primary-dark: #7a2be0;
            --secondary: #ff80b5;
            --bg-dark: #0b0b16;
            --bg-card: #131329;
            --bg-card-hover: #1e1e3a;
            --text-primary: #ffffff;
            --text-secondary: #b9b9e6;
            --ad-gradient: linear-gradient(135deg, #ff99cc, #c05c9e);
            --success-gradient: linear-gradient(135deg, #2be07a, #1fa855);
            --primary-gradient: linear-gradient(135deg, #9b4dff, #7a2be0);
            --border-radius-md: 12px;
            --glass-bg: rgba(20, 20, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 10% 20%, #12122a, #05050c);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .main-header {
            padding: 10px 20px;
            text-align: center;
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(155, 77, 255, 0.15);
            z-index: 20;
            flex-shrink: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ffffff, #c084fc, #ff99cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .screen-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            animation: fadeSlideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            padding: 0 12px;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at 10% 20%, #12122a, #05050c);
            padding-bottom: 60px; 
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        .user-profile {
            display: flex;
            align-items: center;
            background: rgba(30, 30, 58, 0.6);
            border: 1px solid rgba(155, 77, 255, 0.2);
            border-radius: 16px;
            padding: 10px;
            flex-shrink: 0;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            margin-right: 12px;
            background: #2a2a4a;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-greeting {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .user-zodiac {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(90deg, #fff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .signs-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex: 1;
            align-content: start;
            justify-content: center;
            width: 100%;
            padding-bottom: 20px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .signs-grid::-webkit-scrollbar { display: none; }

        .sign-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(155, 77, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1/1.1;
        }

        .sign-card:active {
            transform: scale(0.94);
            background: var(--bg-card-hover);
            border-color: var(--primary);
        }

        .sign-img {
            width: 60%;
            height: 60%;
            object-fit: contain;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .sign-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #f0eefc;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
        }

        /* --- ЭКРАН ДЕТАЛЬНОГО ГОРОСКОПА --- */
        .detail-nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0 10px 0;
            flex-shrink: 0;
        }

        .back-btn-text {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 6px 12px;
            transition: all 0.2s;
        }
        .back-btn-text:active { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .current-date-display {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .control-panel {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 5px 0;
            flex-shrink: 0;
        }

        .sign-identity-card {
            flex: 0 0 auto;
            background: rgba(30, 30, 58, 0.4);
            border: 1px solid rgba(155, 77, 255, 0.15);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 6px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .sign-hero-img {
            width:50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 12px rgba(155, 77, 255, 0.4));
        }

        .sign-hero-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .sign-hero-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.2;
        }

        .actions-column {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tabs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .tab-btn {
            background: rgba(53, 48, 66, 0.6);
            border: 1px solid rgba(155, 77, 255, 0.2);
            border-radius: 12px;
            color: #dcdcf5;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            position: relative;
            overflow: hidden;
            padding: 8px;
            backdrop-filter: blur(4px);
        }

        .tab-btn span { 
            font-size: 1.4rem; 
            margin-bottom: 2px; 
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .tab-btn:active { transform: scale(0.96); }

        .tab-btn.active-tab {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(155, 77, 255, 0.4);
        }
        
        .tab-btn:not(.active-tab):active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(155, 77, 255, 0.4);
        }

        .reward-btn {
            min-height: 60px;
            width: 100%;
            background: linear-gradient(135deg, #2a2a4a, #1e1e3a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            color: #8888aa;
            font-weight: 700;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .reward-btn.unlocked {
            background: var(--success-gradient);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(43, 224, 122, 0.3);
            animation: pulseGreen 2s infinite;
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(43, 224, 122, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(43, 224, 122, 0); }
            100% { box-shadow: 0 0 0 0 rgba(43, 224, 122, 0); }
        }

        .reward-btn:active { transform: scale(0.98); }
        
        .reward-btn:disabled { 
            opacity: 1; 
            cursor: not-allowed; 
        }

        .ad-badge {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 0.6rem;
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255,255,255,0.7);
            padding: 3px 6px;
            border-bottom-left-radius: 8px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .detail-content-scroll {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            background: rgba(19, 19, 41, 0.3);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid rgba(155, 77, 255, 0.1);
            margin-top: 5px;
        }

        .scrollable-wrapper {
            flex: 1;
            padding: 6px;
            scrollbar-width: none;
        }
        .scrollable-wrapper::-webkit-scrollbar { display: none; }

        .friends-label {
            font-size: 0.85rem;
            color: #dcdcf5;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .friends-strip {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .friends-strip::-webkit-scrollbar { display: none; }

        .friend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .friend-avatar-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin-bottom: 4px;
            box-shadow: 0 2px 8px rgba(155, 77, 255, 0.2);
        }

        .friend-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-dark);
            background-color: #2a2a4a;
        }

        .friend-name {
            font-size: 0.65rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px;
            text-align: center;
        }

        .compat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            background: rgba(30, 30, 58, 0.5);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(155, 77, 255, 0.1);
        }

        .compat-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .compat-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease-out;
        }

        .compat-score {
            font-size: 0.65rem;
            font-weight: 700;
            margin-top: 3px;
        }

        /* --- НОВОЕ МОДАЛЬНОЕ ОКНО (СТЕКЛО) --- */
        .modal-overlay {
            position: fixed;
            /* Отступ 16px от всех краев экрана */
            inset: 16px; 
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Прижимаем к низу для анимации выезда */
            pointer-events: none; /* Чтобы клики проходили сквозь невидимую часть */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .modal-content {
            width: 100%;
            height: 100%; /* Занимает всю доступную высоту (с учетом inset) */
            
            /* Эффект стекла */
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            
            border-radius: 24px;
            
            /* Структура Flexbox */
            display: flex;
            flex-direction: column;
            
            /* Анимация выезда снизу */
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            
            overflow: hidden; /* Важно для скругления углов */
        }

        .modal-overlay.visible .modal-content {
            transform: translateY(0);
        }

        /* Шапка модалки (фиксированная) */
        .modal-header-fixed {
            flex-shrink: 0;
            padding: 20px 20px 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
            z-index: 2;
        }

        .modal-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .modal-sign-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(155, 77, 255, 0.6));
        }

        .modal-titles {
            display: flex;
            flex-direction: column;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
        }

        .modal-subtitle {
            font-size: 0.75rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .modal-close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-close-btn:active { 
            background: rgba(255, 255, 255, 0.25); 
            transform: scale(0.9);
        }

        /* Тело модалки (скроллящееся) */
        .modal-body-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 24px;
            scrollbar-width: none; /* Firefox */
        }
        .modal-body-scroll::-webkit-scrollbar { 
            display: none; /* Chrome/Safari */
        }

        .modal-text-body {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e3e3fc;
            white-space: pre-wrap;
            text-align: left;
            min-height: 100px; /* Чтобы курсор был виден сразу */
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: var(--primary);
            margin-left: 2px;
            font-weight: bold;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Подвал модалки (пустой, так как реклама только на главном) */
        .modal-footer-ad {
            flex-shrink: 0;
            width: 100%;
            height: 10px; /* Минимальная высота, так как рекламы тут нет */
            background: transparent;
        }

        /* VK Ad Banner Styles (для главного экрана) */
        #vk-ad-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(19, 19, 41, 0.95);
            z-index: 50;
            display: none; 
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="main-header" id="main-header">
            <h1>✨ Звёздный Гид</h1>
        </header>

        <div class="screen-container">
            <!-- Экран выбора знака -->
            <main id="selection-screen" class="screen active">
                <div class="loading" id="loading">
                    <div style="font-size: 2rem; margin-bottom: 10px;">🔮</div>
                    <div>Связь с космосом...</div>
                </div>

                <div id="user-profile-block" class="user-profile" style="display: none;">
                    <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                    <div class="user-info">
                        <span class="user-greeting" id="user-greeting">Привет!</span>
                        <span class="user-zodiac" id="user-zodiac-sign">Загрузка...</span>
                    </div>
                </div>

                <div class="signs-grid" id="signs-grid"></div>
            </main>

            <!-- Экран деталей -->
            <main id="horoscope-screen" class="screen">
                <div class="detail-nav-bar">
                    <button class="back-btn-text" id="back-button">← Назад</button>
                    <div class="current-date-display" id="current-date-display">23 апреля</div>
                </div>

                <div class="control-panel">
                    <div class="sign-identity-card">
                        <img class="sign-hero-img" id="h-sign-img" src="" alt="знак">
                        <div class="sign-hero-name" id="h-name">Овен</div>
                        <div class="sign-hero-date" id="h-date-range">21 мар — 19 апр</div>
                    </div>

                    <div class="actions-column">
                        <div class="tabs-grid">
                            <button class="tab-btn" data-tab="general">
                                <span>🔮</span> Общий
                            </button>
                            <button class="tab-btn" data-tab="love">
                                <span>💕</span> Любовь
                            </button>
                            <button class="tab-btn" data-tab="business">
                                <span>💼</span> Работа
                            </button>
                            <button class="tab-btn" data-tab="compatibility">
                                <span>💞</span> Совмест.
                            </button>
                        </div>
                        
                        <button class="reward-btn" id="tomorrow-btn">
                            <span class="ad-badge">AD</span>
                            <span>🌙 Гороскоп на завтра</span>
                        </button>
                    </div>
                </div>

                <div class="detail-content-scroll">
                    <div class="scrollable-wrapper">
                        <!-- Кнопка запроса прав на друзей -->
                        <div id="friends-permission-block" style="display: none; margin-bottom: 12px;">
                            <button class="tab-btn" id="request-friends-btn" style="width: 100%; padding: 8px 12px; flex-direction: row; justify-content: center; gap: 6px; background: linear-gradient(135deg, #4a9eff, #2b7ce0); border-color: transparent; font-size: 0.75rem;">
                                <span style="font-size: 1.1rem;">👥</span>
                                <span>Друзья этого знака</span>
                            </button>
                        </div>
                        
                        <div class="friends-label" id="friends-label">
                            <span>👥</span> Твои друзья этого же знака:
                        </div>
                        <div class="friends-strip" id="friends-list"></div>
                        
                        <div style="text-align: center; color: var(--text-secondary); font-size: 0.75rem; margin-top: 6px; opacity: 0.4;">
                            Выберите категорию выше ✨
                        </div>
                    </div>
                </div>
                
                <!-- Баннер теперь управляется через JS и показывается только на главном экране -->
                <div id="vk-ad-banner"></div>
            </main>
        </div>
    </div>

    <!-- НОВОЕ МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            
            <!-- Фиксированная шапка -->
            <div class="modal-header-fixed">
                <div class="modal-header-info">
                    <img id="modal-sign-img" class="modal-sign-img" src="" alt="Sign">
                    <div class="modal-titles">
                        <div class="modal-title" id="modal-title">Заголовок</div>
                        <div class="modal-subtitle" id="modal-subtitle">Прогноз звезд</div>
                    </div>
                </div>
                <button class="modal-close-btn" id="modal-close-btn">×</button>
            </div>

            <!-- Скроллящийся текст -->
            <div class="modal-body-scroll">
                <div class="modal-text-body typing-cursor" id="modal-text-body"></div>
            </div>

            <!-- Пустой подвал (реклама убрана отсюда) -->
            <div class="modal-footer-ad"></div>
            
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ЗАПРОСА ПРАВ НА ДРУЗЕЙ -->
    <div class="modal-overlay" id="permission-modal-overlay">
        <div class="modal-content" style="height: auto; max-height: 60%;">
            
            <!-- Фиксированная шапка -->
            <div class="modal-header-fixed" style="padding: 12px 16px 6px 16px;">

            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) return 'aries';

            if ((month === 5 && day >= 21) || (month === 6 && day <= 20)) return 'gemini';

                });
                if (result && result.access_token) {
                    vkAccessToken = result.access_token;
                    friendsPermissionGranted = true;
                    updateFriendsPermissionUI();
                    return true;
                }
            } catch (error) { return false; }
            return false;

            if (friendsCache) return friendsCache;

                    const hasPermission = await requestFriendsPermission();
                    if (!hasPermission) return [];
                }

                const response = await vkBridge.send("VKWebAppCallAPIMethod", {
                    method: "friends.get",
                    params: {
                        v: "5.131",
                        fields: "photo_100,first_name,bdate,sex",
                        order: "hints",
                        count: 100,
                        access_token: vkAccessToken
                    }
                });

                if (response && response.response) {
                    const friends = response.response.items || response.response;
                    friendsCache = friends;
                    return friendsCache;
                } else if (response && response.items) {
                    friendsCache = response.items;
                    return friendsCache;
                }
            } catch (error) {
                if (error.error_data?.error_code === 2) {
                    vkAccessToken = null;
                    friendsPermissionGranted = false;
                    return await fetchRealFriends();
                }

                container.innerHTML = '<div style="padding:10px; color:#666; font-size:0.8rem; width:100%; text-align:center;">Нет данных о друзьях</div>';

                    let friendSignName = null;

                    if (friend.bdate) {
                        const parts = friend.bdate.split('.');
                        if (parts.length >= 2) {
                            const day = parseInt(parts[0]);
                            const month = parseInt(parts[1]);
                            if (!isNaN(day) && !isNaN(month)) {
                                const fSign = getZodiacByDate(day, month);

                                    hasSign = true;
                                    friendSignName = ZODIAC_SIGNS[fSign].name;
                                    if (COMPATIBILITY_MATRIX[mySignKey] && COMPATIBILITY_MATRIX[mySignKey][fSign] !== undefined) {
                                        score = COMPATIBILITY_MATRIX[mySignKey][fSign];
                                    }
                                }
                            }
                        }
                    }
                    return hasSign ? { ...friend, score, friendSignName } : null;
                })
                .filter(item => item !== null);

            scoredFriends.sort((a, b) => b.score - a.score);

                container.appendChild(item);
            });
        }

     async function loadHoroscopeData() {
    const loadingEl = document.getElementById('loading');
    const gridEl = document.getElementById('signs-grid');

    gridEl.style.display = 'none';
    
    fetchUserData();

    const baseUrl = './horoscope_advanced.json'; // или 'horoscope_advanced.json'
    // Убираем параметр времени для локального файла
    const uniqueUrl = baseUrl;
    
    try {
        const response = await fetch(uniqueUrl);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        horoscopeCache = await response.json();
        localStorage.setItem('horoscope_data_cache', JSON.stringify(horoscopeCache));
        
    } catch (err) {
        console.error("Ошибка загрузки гороскопа:", err);
        
        // Если интернета нет или ошибка, пробуем показать последний сохраненный
        const cachedData = localStorage.getItem('horoscope_data_cache');
        if (cachedData) {
            horoscopeCache = JSON.parse(cachedData);
        } else {
            generateFallbackData();
        }
    }

            renderGrid();
            loadingEl.style.display = 'none';
            gridEl.style.display = 'grid';

            const today = new Date();
            const options = { day: 'numeric', month: 'long' };
            document.getElementById('current-date-display').innerText = today.toLocaleDateString('ru-RU', options);
            
            updateBannerVisibility();
        }

        function generateFallbackData() {
            horoscopeCache = {};
            const texts = {
                general: "Звёзды советуют быть внимательнее к деталям. Ваша энергия на высоте.",
                love: "В любовных делах возможен приятный сюрприз.",
                business: "Финансовая удача на вашей стороне.",
                tomorrow: "Завтрашний день потребует осторожности."
            };
            for (const [key, info] of Object.entries(ZODIAC_SIGNS)) {
                horoscopeCache[key] = {
                    general: { text: texts.general },
                    love: { text: texts.love },
                    business: { text: texts.business },
                    tomorrow: { text: texts.tomorrow }
                };
            }
        }

            const label = document.getElementById('friends-label');
            
            if (!friendsPermissionGranted) {
                permissionBlock.style.display = 'block';
                label.style.display = 'none';
                renderFriendsForSign(key); // Покажет сообщение о необходимости нажать кнопку
            } else {
                permissionBlock.style.display = 'none';
                label.style.display = 'flex';
                renderFriendsForSign(key); // Загрузит друзей
            }

            document.getElementById('main-header').style.display = 'none';
            document.getElementById('selection-screen').classList.remove('active');
            document.getElementById('horoscope-screen').classList.add('active');
            
            // Обновляем видимость баннера (скрываем его, т.к. ушли с главного экрана)
            updateBannerVisibility();
        }

        function resetTomorrowButton() {
            const btn = document.getElementById('tomorrow-btn');
            btn.classList.remove('unlocked');
            btn.innerHTML = `<span class="ad-badge">AD</span><span>🔒 Гороскоп на завтра</span>`;
            btn.disabled = false;
        }

        function openModal(title, text, signKey) {
            const modal = document.getElementById('modal-overlay');
            const titleEl = document.getElementById('modal-title');
            const subtitleEl = document.getElementById('modal-subtitle');
            const bodyEl = document.getElementById('modal-text-body');
            const imgEl = document.getElementById('modal-sign-img');

            if (signKey && ZODIAC_SIGNS[signKey]) {
                imgEl.src = ZODIAC_SIGNS[signKey].img;
                imgEl.onerror = function() { this.src = PLACEHOLDER_BASE + ZODIAC_SIGNS[signKey].name[0]; };
                titleEl.innerText = ZODIAC_SIGNS[signKey].name;
                
                if (title.includes('Любовь')) subtitleEl.innerText = "❤️ Любовный прогноз";
                else if (title.includes('Работа')) subtitleEl.innerText = "💼 Карьера и финансы";
                else if (title.includes('Совместимость')) subtitleEl.innerText = "💞 Анализ связей";
                else if (title.includes('завтра')) subtitleEl.innerText = "🌙 Прогноз на завтра";
                else subtitleEl.innerText = "🔮 Общий прогноз";
            } else {
                imgEl.src = "";
                titleEl.innerText = title;
                subtitleEl.innerText = "";
            }

            bodyEl.innerText = ""; 
            
            modal.classList.add('visible');
            
            // Реклама внутри модалки больше не вызывается

            let i = 0;
            const speed = 15; // Скорость печати (мс)
            
            if (typingInterval) clearInterval(typingInterval);
            
            // Скроллим вверх перед началом печати
            const scrollContainer = document.querySelector('.modal-body-scroll');
            if(scrollContainer) scrollContainer.scrollTop = 0;

            typingInterval = setInterval(() => {
                if (i < text.length) {
                    bodyEl.innerText += text.charAt(i);
                    i++;
                    // Автопрокрутка вниз при печати
                    if(scrollContainer) {
                         scrollContainer.scrollTop = scrollContainer.scrollHeight;
                    }
                } else {
                    clearInterval(typingInterval);
                    bodyEl.classList.remove('typing-cursor');
                }
            }, speed);
        }

        function closeModal() {
            const modal = document.getElementById('modal-overlay');
            modal.classList.remove('visible');
            if (typingInterval) clearInterval(typingInterval);
            
            // При закрытии модалки проверяем, нужно ли вернуть баннер
            // Если мы вернулись на главный экран (хотя модалка поверх всего, логика зависит от того, какой экран активен под ней)
            // Но обычно модалка закрывается на экране деталей. В этом случае баннер не нужен.
            // Если модалка была вызвана с главного экрана (гипотетически), то баннер должен остаться.
            updateBannerVisibility();
        }

        function showFullScreenAd(onSuccess) {
            if (!vkBridge) {
                onSuccess();
                return;
            }

            vkBridge.send("VKWebAppShowNativeAds", { ad_format: "interstitial" })
                .then((data) => {
                    if (data.result) {
                        onSuccess();
                    } else {
                        onSuccess();
                    }
                })
                .catch((error) => {
                    console.log("Ошибка показа рекламы:", error);
                    onSuccess();
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHoroscopeData();

            document.getElementById('modal-close-btn').addEventListener('click', closeModal);
            document.getElementById('permission-modal-close-btn').addEventListener('click', closePermissionModal);

            // Обработчик кнопки запроса прав на друзей
            document.getElementById('request-friends-btn').addEventListener('click', () => {
                showPermissionInfoModal('friends');
            });

            // Обработчик кнопки подтверждения в модальном окне прав
            document.getElementById('permission-grant-btn').addEventListener('click', async () => {
                const hasPermission = await requestFriendsPermission();
                if (hasPermission) {
                    closePermissionModal();
                    // После предоставления прав обновляем UI для обоих разделов
                    updateFriendsPermissionUI();
                } else {
                    alert('Не удалось получить доступ к друзьям. Попробуйте позже.');
                    closePermissionModal();
                }
            });

            document.getElementById('back-button').addEventListener('click', () => {
                document.getElementById('horoscope-screen').classList.remove('active');
                document.getElementById('selection-screen').classList.add('active');
                document.getElementById('main-header').style.display = 'flex';
                
                // Возвращаемся на главный экран -> включаем баннер
                updateBannerVisibility();
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const target = e.currentTarget;
                    const type = target.dataset.tab;

                    // Для вкладки совместимости проверяем права и рендерим
                    if (type === 'compatibility') {
                        renderFriendsCompatibility(currentSignKey);
                    } else {
                        // Для остальных вкладок (general, love, business) - просто открываем модалку с текстом
                        let text = "Загрузка...";
                        if (horoscopeCache && horoscopeCache[currentSignKey] && horoscopeCache[currentSignKey][type]) {
                            text = horoscopeCache[currentSignKey][type].text;
                        } else {
                            text = "Звёзды молчат... Попробуйте позже.";
                        }

                        openModal(target.innerText.trim(), text, currentSignKey);
                        
                        // Обновляем список друзей для текущего знака (чтобы убрать список совместимости)
                        renderFriendsForSign(currentSignKey);
                    }
                });
            });

            document.getElementById('tomorrow-btn').addEventListener('click', function() {
                const btn = this;
                
                if (btn.classList.contains('unlocked')) {
                    let text = "Загрузка...";
                    if (horoscopeCache && horoscopeCache[currentSignKey] && horoscopeCache[currentSignKey]['tomorrow']) {
                        text = horoscopeCache[currentSignKey]['tomorrow'].text;
                    } else {
                        text = "Завтра будет интересный день. Звезды рекомендуют быть начеку.";
                    }
                    openModal("Гороскоп на завтра", text, currentSignKey);
                } 
                else {
                    showFullScreenAd(() => {
                        btn.classList.add('unlocked');
                        btn.innerHTML = `<span>✅ Показать гороскоп</span>`;
                    });
                }
            });
        
            const slider = document.querySelector('.friends-strip');
            let isDown = false;
            let startX;
            let scrollLeft;

            if (slider) {
                slider.addEventListener('dragstart', (e) => e.preventDefault());
                slider.addEventListener('mousedown', (e) => {
                    isDown = true;
                    slider.style.cursor = 'grabbing';
                    startX = e.pageX - slider.offsetLeft;
                    scrollLeft = slider.scrollLeft;
                });
                slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = 'grab'; });
                slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'grab'; });
                slider.addEventListener('mousemove', (e) => {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - slider.offsetLeft;
                    const walk = (x - startX) * 2;
                    slider.scrollLeft = scrollLeft - walk;
                });
                slider.style.cursor = 'grab';
            }
        });
    </script>
</body>
</html>
