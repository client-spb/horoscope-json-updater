name: Update Horoscope JSON
on:
  schedule:
    # Запуск ежедневно в 00:00 UTC (03:00 МСК)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Позволяет запустить вручную через кнопку "Run workflow"

permissions:
  contents: write  # Разрешаем Action пушить изменения в репозиторий

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run horoscope scraper
        run: python update_horoscope_advanced

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add horoscope.json
          # Коммитим только если файл изменился
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Update horoscope JSON [skip ci]"
          git push
